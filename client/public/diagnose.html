<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移动诊断工具</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a2e;
      color: #eee;
      padding: 20px;
      margin: 0;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { color: #4ecca3; }
    .step {
      background: #16213e;
      border: 1px solid #4ecca3;
      border-radius: 8px;
      padding: 15px;
      margin: 15px 0;
    }
    .step h3 {
      color: #4ecca3;
      margin-top: 0;
    }
    .code {
      background: #0f0f23;
      padding: 10px;
      border-radius: 4px;
      font-size: 14px;
      overflow-x: auto;
    }
    .btn {
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    .btn:hover {
      background: #45b393;
    }
    .result {
      background: #0f0f23;
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      white-space: pre-wrap;
      font-size: 13px;
      max-height: 300px;
      overflow-y: auto;
    }
    .success { color: #4ecca3; }
    .error { color: #ff6b6b; }
    .warning { color: #ffd93d; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 角色移动诊断工具</h1>
    <p>请在游戏运行时打开此页面，按顺序执行诊断步骤</p>
    
    <div class="step">
      <h3>步骤 1: 检查游戏是否运行</h3>
      <button class="btn" onclick="checkGame()">检查游戏状态</button>
      <div id="result1" class="result"></div>
    </div>
    
    <div class="step">
      <h3>步骤 2: 检查 Canvas 元素</h3>
      <button class="btn" onclick="checkCanvas()">检查 Canvas</button>
      <div id="result2" class="result"></div>
    </div>
    
    <div class="step">
      <h3>步骤 3: 检查玩家数据</h3>
      <button class="btn" onclick="checkPlayer()">检查玩家数据</button>
      <div id="result3" class="result"></div>
    </div>
    
    <div class="step">
      <h3>步骤 4: 检查输入监听</h3>
      <button class="btn" onclick="checkInput()">测试输入监听</button>
      <div id="result4" class="result"></div>
    </div>
    
    <div class="step">
      <h3>步骤 5: 测试移动</h3>
      <button class="btn" onclick="testMove()">模拟移动</button>
      <div id="result5" class="result"></div>
    </div>
    
    <div class="step">
      <h3>步骤 6: 检查网络</h3>
      <button class="btn" onclick="checkNetwork()">检查 WebSocket</button>
      <div id="result6" class="result"></div>
    </div>
    
    <div class="step">
      <h3>📋 诊断报告</h3>
      <button class="btn" onclick="generateReport()">生成报告</button>
      <div id="report" class="result"></div>
    </div>
  </div>

  <script>
    const results = {}
    
    function checkGame() {
      const output = document.getElementById('result1')
      try {
        // 检查游戏是否在 iframe 中
        const gameFrame = document.querySelector('iframe')
        if (gameFrame) {
          output.innerHTML = '<span class="success">✅ 游戏页面已打开</span>'
          output.innerHTML += '\n游戏 URL: ' + gameFrame.src
          results.game = 'running'
        } else {
          output.innerHTML = '<span class="warning">⚠️ 请在游戏页面打开此诊断工具</span>'
          output.innerHTML += '\n\n或者在新标签页打开：http://localhost:3001'
          results.game = 'not_found'
        }
      } catch (e) {
        output.innerHTML = '<span class="error">❌ 错误：' + e.message + '</span>'
        results.game = 'error'
      }
    }
    
    function checkCanvas() {
      const output = document.getElementById('result2')
      try {
        const canvas = document.querySelector('canvas')
        if (!canvas) {
          output.innerHTML = '<span class="error">❌ Canvas 元素不存在</span>'
          output.innerHTML += '\n\n可能原因：\n1. 游戏未加载完成\n2. Pixi.js 初始化失败\n3. 页面结构错误'
          results.canvas = 'not_found'
          return
        }
        
        output.innerHTML = '<span class="success">✅ Canvas 元素存在</span>'
        output.innerHTML += '\n尺寸：' + canvas.width + 'x' + canvas.height
        output.innerHTML += '\nTabIndex: ' + (canvas.tabIndex || '未设置')
        output.innerHTML += '\nFocus 状态：' + (document.activeElement === canvas ? '已聚焦' : '未聚焦')
        
        // 尝试 focus
        canvas.tabIndex = 1
        canvas.focus()
        output.innerHTML += '\n\n<span class="success">✅ 已尝试强制 focus</span>'
        
        results.canvas = canvas.width > 0 ? 'ok' : 'empty'
      } catch (e) {
        output.innerHTML = '<span class="error">❌ 错误：' + e.message + '</span>'
        results.canvas = 'error'
      }
    }
    
    function checkPlayer() {
      const output = document.getElementById('result3')
      try {
        // 尝试访问 gameStore
        if (typeof useGameStore !== 'undefined') {
          const state = useGameStore.getState()
          if (state.player) {
            output.innerHTML = '<span class="success">✅ 玩家数据存在</span>'
            output.innerHTML += '\n\n玩家信息:'
            output.innerHTML += '\nID: ' + state.player.id
            output.innerHTML += '\n名字：' + state.player.name
            output.innerHTML += '\n位置：(' + state.player.x + ', ' + state.player.y + ')'
            output.innerHTML += '\n等级：' + (state.player.level || 'N/A')
            results.player = 'ok'
          } else {
            output.innerHTML = '<span class="error">❌ 玩家数据不存在</span>'
            output.innerHTML += '\n\n可能原因：\n1. 未登录\n2. 登录失败\n3. 数据未同步'
            results.player = 'not_found'
          }
        } else {
          output.innerHTML = '<span class="error">❌ useGameStore 未定义</span>'
          output.innerHTML += '\n\n游戏代码可能未加载完成'
          results.player = 'store_not_found'
        }
      } catch (e) {
        output.innerHTML = '<span class="error">❌ 错误：' + e.message + '</span>'
        results.player = 'error'
      }
    }
    
    function checkInput() {
      const output = document.getElementById('result4')
      output.innerHTML = '<span class="warning">⏳ 等待输入测试...</span>'
      output.innerHTML += '\n\n请按 W/A/S/D 键或右键点击游戏画面'
      output.innerHTML += '\n\n观察游戏控制台（F12 → Console）是否有日志输出'
      
      // 添加临时监听器
      const handler = (e) => {
        output.innerHTML += '\n<span class="success">✅ 检测到按键：' + e.code + '</span>'
      }
      window.addEventListener('keydown', handler, { once: true })
      
      results.input = 'testing'
    }
    
    function testMove() {
      const output = document.getElementById('result5')
      try {
        if (typeof useGameStore === 'undefined') {
          output.innerHTML = '<span class="error">❌ useGameStore 未定义</span>'
          results.move = 'store_not_found'
          return
        }
        
        const state = useGameStore.getState()
        if (!state.player) {
          output.innerHTML = '<span class="error">❌ 玩家不存在，无法测试移动</span>'
          results.move = 'no_player'
          return
        }
        
        // 模拟移动
        const newX = state.player.x + 100
        const newY = state.player.y + 100
        
        output.innerHTML = '<span class="warning">⏳ 尝试更新玩家位置...</span>'
        output.innerHTML += '\n从：(' + state.player.x + ', ' + state.player.y + ')'
        output.innerHTML += '\n到：(' + newX + ', ' + newY + ')'
        
        state.updatePlayer({ x: newX, y: newY })
        
        output.innerHTML += '\n<span class="success">✅ 位置已更新</span>'
        output.innerHTML += '\n\n请观察游戏画面中角色是否移动'
        output.innerHTML += '\n如果没有移动，说明渲染系统有问题'
        
        results.move = 'ok'
      } catch (e) {
        output.innerHTML = '<span class="error">❌ 错误：' + e.message + '</span>'
        results.move = 'error'
      }
    }
    
    function checkNetwork() {
      const output = document.getElementById('result6')
      try {
        // 尝试访问 network
        if (typeof network !== 'undefined') {
          const ws = network.ws || network.socket
          if (ws) {
            const states = ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED']
            const stateName = states[ws.readyState] || 'UNKNOWN'
            
            output.innerHTML = '<span class="' + (ws.readyState === 1 ? 'success' : 'error') + '">'
            output.innerHTML += (ws.readyState === 1 ? '✅' : '❌') + ' WebSocket 状态：' + stateName + '</span>'
            output.innerHTML += '\nURL: ' + ws.url
            
            if (ws.readyState === 1) {
              output.innerHTML += '\n<span class="success">✅ 连接正常</span>'
              results.network = 'ok'
            } else {
              output.innerHTML += '\n<span class="error">❌ 连接异常，请检查服务器</span>'
              results.network = 'disconnected'
            }
          } else {
            output.innerHTML = '<span class="error">❌ WebSocket 对象不存在</span>'
            results.network = 'not_found'
          }
        } else {
          output.innerHTML = '<span class="error">❌ network 对象未定义</span>'
          results.network = 'not_found'
        }
      } catch (e) {
        output.innerHTML = '<span class="error">❌ 错误：' + e.message + '</span>'
        results.network = 'error'
      }
    }
    
    function generateReport() {
      const output = document.getElementById('report')
      
      output.innerHTML = '📋 === 诊断报告 ===\n\n'
      
      const checks = [
        { key: 'game', name: '游戏运行状态', ok: 'running', bad: 'not_found' },
        { key: 'canvas', name: 'Canvas 元素', ok: 'ok', bad: 'not_found' },
        { key: 'player', name: '玩家数据', ok: 'ok', bad: 'not_found' },
        { key: 'network', name: '网络连接', ok: 'ok', bad: 'disconnected' },
        { key: 'move', name: '移动测试', ok: 'ok', bad: 'error' }
      ]
      
      let allOk = true
      checks.forEach(check => {
        const status = results[check.key] || 'unknown'
        const isOk = status === check.ok || status === true
        const icon = isOk ? '✅' : (status === 'unknown' ? '❓' : '❌')
        output.innerHTML += icon + ' ' + check.name + ': ' + status + '\n'
        if (!isOk) allOk = false
      })
      
      output.innerHTML += '\n'
      if (allOk) {
        output.innerHTML += '<span class="success">✅ 所有检查通过！</span>\n'
        output.innerHTML += '\n如果角色仍然无法移动，请检查:\n'
        output.innerHTML += '1. PlayerControlsSystem 是否正确初始化\n'
        output.innerHTML += '2. 输入事件是否被正确监听\n'
        output.innerHTML += '3. 移动指令是否发送到服务器\n'
      } else {
        output.innerHTML += '<span class="error">❌ 发现问题！</span>\n'
        output.innerHTML += '\n请修复上述标红的问题后再试\n'
      }
      
      output.innerHTML += '\n\n=== 请将此报告发送给开发者 ==='
    }
  </script>
</body>
</html>
