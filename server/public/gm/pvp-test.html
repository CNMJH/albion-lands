<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GM 工具 - PVP 测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e4;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .card h2 {
      margin-bottom: 15px;
      color: #4ecca3;
      border-bottom: 1px solid rgba(78, 204, 163, 0.3);
      padding-bottom: 10px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #a0a0a0;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 5px;
      background: rgba(0, 0, 0, 0.3);
      color: #e4e4e4;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4ecca3;
    }

    button {
      background: linear-gradient(135deg, #4ecca3 0%, #38a169 100%);
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4);
    }

    button.danger {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
    }

    button.danger:hover {
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
    }

    button.info {
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
    }

    button.info:hover {
      box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
    }

    .result {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 5px;
      padding: 15px;
      margin-top: 15px;
      max-height: 400px;
      overflow-y: auto;
    }

    .result pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #e4e4e4;
    }

    .success {
      color: #4ecca3;
    }

    .error {
      color: #e74c3c;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }

    .stat-box {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 5px;
      text-align: center;
    }

    .stat-box .value {
      font-size: 24px;
      font-weight: bold;
      color: #4ecca3;
    }

    .stat-box .label {
      font-size: 12px;
      color: #a0a0a0;
      margin-top: 5px;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    .leaderboard-table th,
    .leaderboard-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .leaderboard-table th {
      background: rgba(78, 204, 163, 0.2);
      color: #4ecca3;
    }

    .leaderboard-table tr:hover {
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚔️ GM 工具 - PVP 测试</h1>

    <!-- 攻击玩家 -->
    <div class="card">
      <h2>🗡️ 攻击玩家</h2>
      <div class="form-group">
        <label>攻击者 ID:</label>
        <select id="attackerId">
          <option value="1fc5bfa9-a54b-406c-abaa-adb032a3f59a">测试玩家 1</option>
          <option value="d066765f-7f8a-4c00-a72f-0a29113a843b">测试玩家 2</option>
          <option value="c25a68c1-8b14-4084-b6c2-3f4a7ee81fd1">测试玩家 3</option>
        </select>
      </div>
      <div class="form-group">
        <label>目标 ID:</label>
        <select id="targetId">
          <option value="d066765f-7f8a-4c00-a72f-0a29113a843b">测试玩家 2</option>
          <option value="1fc5bfa9-a54b-406c-abaa-adb032a3f59a">测试玩家 1</option>
          <option value="c25a68c1-8b14-4084-b6c2-3f4a7ee81fd1">测试玩家 3</option>
        </select>
      </div>
      <div class="form-group">
        <label>伤害值:</label>
        <input type="number" id="damage" value="100" min="1">
      </div>
      <div class="form-group">
        <label>技能 ID (可选):</label>
        <input type="text" id="skillId" placeholder="例如：fireball">
      </div>
      <button onclick="attackPlayer()">⚔️ 攻击玩家</button>
      <div id="attackResult" class="result"></div>
    </div>

    <!-- PVP 统计 -->
    <div class="card">
      <h2>📊 PVP 统计</h2>
      <div class="form-group">
        <label>角色 ID:</label>
        <select id="statsCharacterId">
          <option value="1fc5bfa9-a54b-406c-abaa-adb032a3f59a">测试玩家 1</option>
          <option value="d066765f-7f8a-4c00-a72f-0a29113a843b">测试玩家 2</option>
          <option value="c25a68c1-8b14-4084-b6c2-3f4a7ee81fd1">测试玩家 3</option>
        </select>
      </div>
      <button onclick="getPVPStats()">📊 查询统计</button>
      <div id="statsResult" class="result"></div>
    </div>

    <!-- 排行榜 -->
    <div class="card">
      <h2>🏆 PVP 排行榜</h2>
      <div class="form-group">
        <label>类型:</label>
        <select id="leaderboardType">
          <option value="kills">击杀数</option>
          <option value="honor">荣誉点数</option>
        </select>
      </div>
      <button onclick="getLeaderboard()">🏆 查询排行榜</button>
      <div id="leaderboardResult" class="result"></div>
    </div>

    <!-- 击杀记录 -->
    <div class="card">
      <h2>📜 击杀记录</h2>
      <div class="form-group">
        <label>角色 ID:</label>
        <select id="historyCharacterId">
          <option value="1fc5bfa9-a54b-406c-abaa-adb032a3f59a">测试玩家 1</option>
          <option value="d066765f-7f8a-4c00-a72f-0a29113a843b">测试玩家 2</option>
          <option value="c25a68c1-8b14-4084-b6c2-3f4a7ee81fd1">测试玩家 3</option>
        </select>
      </div>
      <button onclick="getKillHistory()">📜 查询记录</button>
      <div id="historyResult" class="result"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3002/api/v1';

    async function attackPlayer() {
      const attackerId = document.getElementById('attackerId').value;
      const targetId = document.getElementById('targetId').value;
      const damage = parseInt(document.getElementById('damage').value);
      const skillId = document.getElementById('skillId').value;

      const resultDiv = document.getElementById('attackResult');
      resultDiv.innerHTML = '<p>正在攻击...</p>';

      try {
        const response = await fetch(`${API_BASE}/pvp/attack`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ attackerId, targetId, damage, skillId }),
        });

        const result = await response.json();

        if (result.success) {
          resultDiv.innerHTML = `
            <p class="success">✅ 攻击成功!</p>
            <pre>${JSON.stringify(result, null, 2)}</pre>
          `;
        } else {
          resultDiv.innerHTML = `
            <p class="error">❌ 攻击失败：${result.message}</p>
            <pre>${JSON.stringify(result, null, 2)}</pre>
          `;
        }
      } catch (error) {
        resultDiv.innerHTML = `
          <p class="error">❌ 请求失败：${error.message}</p>
        `;
      }
    }

    async function getPVPStats() {
      const characterId = document.getElementById('statsCharacterId').value;
      const resultDiv = document.getElementById('statsResult');
      resultDiv.innerHTML = '<p>正在查询...</p>';

      try {
        const response = await fetch(`${API_BASE}/pvp/stats/${characterId}`);
        const result = await response.json();

        if (result.success && result.stats) {
          const stats = result.stats;
          resultDiv.innerHTML = `
            <div class="stats-grid">
              <div class="stat-box">
                <div class="value">${stats.kills}</div>
                <div class="label">击杀</div>
              </div>
              <div class="stat-box">
                <div class="value">${stats.deaths}</div>
                <div class="label">死亡</div>
              </div>
              <div class="stat-box">
                <div class="value">${stats.assists}</div>
                <div class="label">助攻</div>
              </div>
              <div class="stat-box">
                <div class="value">${stats.honorPoints}</div>
                <div class="label">荣誉点</div>
              </div>
              <div class="stat-box">
                <div class="value">${stats.kdRatio}</div>
                <div class="label">K/D</div>
              </div>
            </div>
          `;
        } else {
          resultDiv.innerHTML = '<p class="error">❌ 未找到统计数据</p>';
        }
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">❌ 请求失败：${error.message}</p>`;
      }
    }

    async function getLeaderboard() {
      const type = document.getElementById('leaderboardType').value;
      const resultDiv = document.getElementById('leaderboardResult');
      resultDiv.innerHTML = '<p>正在查询...</p>';

      try {
        const response = await fetch(`${API_BASE}/pvp/leaderboard?type=${type}`);
        const result = await response.json();

        if (result.success && result.leaderboard.length > 0) {
          let html = `
            <table class="leaderboard-table">
              <thead>
                <tr>
                  <th>排名</th>
                  <th>玩家</th>
                  <th>等级</th>
                  <th>击杀</th>
                  <th>死亡</th>
                  <th>K/D</th>
                  <th>荣誉点</th>
                </tr>
              </thead>
              <tbody>
          `;

          result.leaderboard.forEach((player, index) => {
            html += `
              <tr>
                <td>#${player.rank}</td>
                <td>${player.name}</td>
                <td>Lv.${player.level}</td>
                <td>${player.kills}</td>
                <td>${player.deaths}</td>
                <td>${player.kdRatio}</td>
                <td>${player.honorPoints}</td>
              </tr>
            `;
          });

          html += '</tbody></table>';
          resultDiv.innerHTML = html;
        } else {
          resultDiv.innerHTML = '<p>暂无数据</p>';
        }
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">❌ 请求失败：${error.message}</p>`;
      }
    }

    async function getKillHistory() {
      const characterId = document.getElementById('historyCharacterId').value;
      const resultDiv = document.getElementById('historyResult');
      resultDiv.innerHTML = '<p>正在查询...</p>';

      try {
        const response = await fetch(`${API_BASE}/pvp/history/${characterId}`);
        const result = await response.json();

        if (result.success && result.history.length > 0) {
          let html = '<pre>';
          result.history.forEach(record => {
            const action = record.isKiller ? '🗡️ 击杀' : '💀 被杀';
            const target = record.isKiller ? record.victimName : record.killerName;
            const time = new Date(record.timestamp).toLocaleString('zh-CN');
            html += `${time} | ${action} [${target}] | 地图：${record.mapId}\n`;
          });
          html += '</pre>';
          resultDiv.innerHTML = html;
        } else {
          resultDiv.innerHTML = '<p>暂无记录</p>';
        }
      } catch (error) {
        resultDiv.innerHTML = `<p class="error">❌ 请求失败：${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
