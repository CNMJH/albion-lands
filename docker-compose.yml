version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: hululands_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hululands
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hululands_network

  # Redis（可选，后期使用）
  redis:
    image: redis:7-alpine
    container_name: hululands_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hululands_network
    profiles:
      - optional

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  hululands_network:
    driver: bridge
